name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # All binaries are published as assets on this draft release. Release assets are stored
  # separately from Actions artifacts, so they don't count against the artifact storage quota.
  RELEASE_TAG: v1.0.6

jobs:
  # Pre-create one draft release so the matrix jobs below all upload to the same place (and there's
  # no race to create it). A draft release does not create the git tag until it is published.
  release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft --target main \
              --title "BridgeHop $RELEASE_TAG" \
              --notes "Automated build: desktop bundles (Windows / Linux / macOS), CLI binaries for each OS, and an Android arm64 APK (debug-signed, sideloadable)."
          fi

  # Desktop bundles: Windows .exe/.msi, macOS .dmg/.app, Linux .deb/.AppImage/.rpm.
  app:
    name: App bundle — ${{ matrix.os }}
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix ui ci
      - name: Build and upload bundles to the draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'BridgeHop ${{ env.RELEASE_TAG }}'
          releaseDraft: true
          prerelease: false
          projectPath: .
      # Portable Windows build: the raw exe runs standalone with no installer (like OnionHop's
      # portable). tauri-action already compiled it; just publish it as a release asset.
      - name: Upload portable Windows exe
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp target/release/bridgehop-app.exe "BridgeHop-${RELEASE_TAG}-portable-x64.exe"
          gh release upload "$RELEASE_TAG" "BridgeHop-${RELEASE_TAG}-portable-x64.exe" \
            --repo "$GITHUB_REPOSITORY" --clobber

  # Android APK. Debug-signed, sideloadable, arm64-v8a (covers essentially all real phones).
  android:
    name: Android APK
    needs: release
    runs-on: ubuntu-latest
    # When the signing secrets are present we build a small, signed release APK; otherwise we fall
    # back to a debug-signed APK so the workflow still produces something installable.
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4
      # Native libs can be large; reclaim unused preinstalled toolchains so the build doesn't run
      # out of disk (keep the Android SDK and the hosted tool cache).
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix ui ci
      - name: Initialize Android project
        run: npm run tauri -- android init
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      # Regenerate the launcher icons from the app icon so the APK never ships the default logo.
      - name: Apply app icon
        run: npm run tauri -- icon branding/source.png
      # The generated app/build.gradle.kts has no release signing config; write keystore.properties
      # from the secrets and inject the signing config. Only runs when a keystore is configured.
      - name: Configure release signing
        if: env.HAS_KEYSTORE == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          ks="$RUNNER_TEMP/bridgehop-release.jks"
          # Keep only base64-alphabet chars before decoding, so any stray whitespace/BOM/encoding
          # artifact from how the secret was stored can't break the decode.
          printf '%s' "$KEYSTORE_B64" | tr -cd 'A-Za-z0-9+/=' | base64 -d > "$ks"
          {
            echo "storeFile=$ks"
            echo "keyAlias=$KEY_ALIAS"
            echo "password=$KEYSTORE_PASSWORD"
          } > src-tauri/gen/android/keystore.properties
          python3 .github/scripts/patch-android-signing.py
      # Build a single universal APK covering 64-bit and 32-bit ARM, so one file installs on
      # essentially every real Android phone (no per-ABI downloads to juggle).
      - name: Build signed release APK (universal arm64 + armv7)
        if: env.HAS_KEYSTORE == 'true'
        run: npm run tauri -- android build --apk --target aarch64 armv7
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - name: Build debug APK (no keystore configured)
        if: env.HAS_KEYSTORE != 'true'
        run: npm run tauri -- android build --apk --debug --target aarch64 armv7
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - name: Upload APK to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          base=src-tauri/gen/android/app/build/outputs/apk
          apk=$(find "$base" -path '*universal*' -name '*.apk' | head -n1)
          [ -z "$apk" ] && apk=$(find "$base" -name '*.apk' | sort | tail -n1)
          echo "Found APK: $apk"
          cp "$apk" "bridgehop-${RELEASE_TAG}-android-universal.apk"
          gh release upload "$RELEASE_TAG" "bridgehop-${RELEASE_TAG}-android-universal.apk" \
            --repo "$GITHUB_REPOSITORY" --clobber

  # Standalone CLI binary per OS, uploaded to the draft release.
  cli:
    name: CLI binary — ${{ matrix.os }}
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI (release)
        run: cargo build --release -p bridgehop-cli
      - name: Upload CLI to the draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/bridgehop.exe "bridgehop-${RELEASE_TAG}-windows-x86_64.exe"
            gh release upload "$RELEASE_TAG" "bridgehop-${RELEASE_TAG}-windows-x86_64.exe" \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            # macos-latest runners are Apple Silicon (arm64); ubuntu is x86_64.
            os="linux"; arch="x86_64"
            if [ "$RUNNER_OS" = "macOS" ]; then os="macos"; arch="arm64"; fi
            cp target/release/bridgehop "bridgehop-${RELEASE_TAG}-${os}-${arch}"
            gh release upload "$RELEASE_TAG" "bridgehop-${RELEASE_TAG}-${os}-${arch}" \
              --repo "$GITHUB_REPOSITORY" --clobber
          fi
