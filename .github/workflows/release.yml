name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # All binaries are published as assets on this draft release. Release assets are stored
  # separately from Actions artifacts, so they don't count against the artifact storage quota.
  RELEASE_TAG: v0.1.0

jobs:
  # Pre-create one draft release so the matrix jobs below all upload to the same place (and there's
  # no race to create it). A draft release does not create the git tag until it is published.
  release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft --target main \
              --title "BridgeHop $RELEASE_TAG" \
              --notes "Automated build: desktop bundles (Windows / Linux / macOS), CLI binaries for each OS, and an Android arm64 APK (debug-signed, sideloadable)."
          fi

  # Desktop bundles: Windows .exe/.msi, macOS .dmg/.app, Linux .deb/.AppImage/.rpm.
  app:
    name: App bundle — ${{ matrix.os }}
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix ui ci
      - name: Build and upload bundles to the draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: 'BridgeHop ${{ env.RELEASE_TAG }}'
          releaseDraft: true
          prerelease: false
          projectPath: .

  # Android APK. Debug-signed, sideloadable, arm64-v8a (covers essentially all real phones).
  android:
    name: Android APK
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Debug native libs are large and unstripped; reclaim unused preinstalled toolchains so the
      # build doesn't run out of disk (keep the Android SDK and the hosted tool cache).
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix ui ci
      - name: Initialize Android project
        run: npm run tauri -- android init
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - name: Build APK (debug-signed, arm64)
        run: npm run tauri -- android build --apk --debug --target aarch64
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
      - name: Upload APK to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apk=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | head -n1)
          echo "Found APK: $apk"
          cp "$apk" "bridgehop-${RELEASE_TAG}-android-arm64.apk"
          gh release upload "$RELEASE_TAG" "bridgehop-${RELEASE_TAG}-android-arm64.apk" \
            --repo "$GITHUB_REPOSITORY" --clobber

  # Standalone CLI binary per OS, uploaded to the draft release.
  cli:
    name: CLI binary — ${{ matrix.os }}
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI (release)
        run: cargo build --release -p bridgehop-cli
      - name: Upload CLI to the draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp target/release/bridgehop.exe "bridgehop-${RELEASE_TAG}-windows-x86_64.exe"
            gh release upload "$RELEASE_TAG" "bridgehop-${RELEASE_TAG}-windows-x86_64.exe" \
              --repo "$GITHUB_REPOSITORY" --clobber
          else
            # macos-latest runners are Apple Silicon (arm64); ubuntu is x86_64.
            os="linux"; arch="x86_64"
            if [ "$RUNNER_OS" = "macOS" ]; then os="macos"; arch="arm64"; fi
            cp target/release/bridgehop "bridgehop-${RELEASE_TAG}-${os}-${arch}"
            gh release upload "$RELEASE_TAG" "bridgehop-${RELEASE_TAG}-${os}-${arch}" \
              --repo "$GITHUB_REPOSITORY" --clobber
          fi
